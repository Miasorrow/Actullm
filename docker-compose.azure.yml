services:
  back:
    image: <ACR_NAME>.azurecr.io/actullm-back:latest
    environment:
      - CHROMA_PATH=/home/chroma_data
      - LLM_PROVIDER=azure
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - RETRIEVE_URL=http://127.0.0.1:8000/retrieve
    volumes:
      - /home/chroma_data:/home/chroma_data
    expose:
      - "8000"

  front:
    image: <ACR_NAME>.azurecr.io/actullm-front:latest
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - back
      - front
    ports:
      - "80:80"