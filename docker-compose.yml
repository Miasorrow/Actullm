services:
  back:
    volumes:
      - ./chroma_data:/chroma_data
    environment:
      - CHROMA_PATH=/chroma_data
    build: .
    container_name: actullm_back
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"

  front:
    build: ./front
    container_name: actullm_front
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: actullm_nginx
    ports:
      - "8080:80"   
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - back
      - front